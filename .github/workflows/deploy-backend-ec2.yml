name: Build and Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "data/**"
      - ".github/workflows/deploy-backend-ec2.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: false
        default: deploy
        type: choice
        options:
          - deploy
          - fetch-ec2-info

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
  IMAGE_NAME: reddit-narrative-backend

jobs:
  fetch-ec2-info:
    name: Fetch EC2 Instance Info
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'fetch-ec2-info' }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch EC2 Instance Details
        run: |
          echo "========== EC2 Instance State =========="
          aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].{State:State.Name,PublicIP:PublicIpAddress,PrivateIP:PrivateIpAddress,Type:InstanceType,AZ:Placement.AvailabilityZone,SG:SecurityGroups[*].GroupId}' \
            --output table

          echo ""
          echo "========== Security Group Rules (port 80) =========="
          SG_ID=$(aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
            --output text)
          echo "Security Group ID: $SG_ID"
          aws ec2 describe-security-groups \
            --group-ids "$SG_ID" \
            --query 'SecurityGroups[0].IpPermissions[?FromPort==`80`]' \
            --output table

          echo ""
          echo "========== Public IP =========="
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "Current Public IP: $EC2_IP"

  build-and-deploy:
    name: Build Docker Image and Deploy to EC2
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.action == 'deploy' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          no-cache: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure Port 80 is Open
        run: |
          SG_ID=$(aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].SecurityGroups[0].GroupId' \
            --output text)
          echo "Authorizing port 80 on SG: $SG_ID"
          aws ec2 authorize-security-group-ingress \
            --group-id "$SG_ID" \
            --protocol tcp \
            --port 80 \
            --cidr 0.0.0.0/0 2>/dev/null || echo "Rule already exists or failed"

      - name: Get EC2 Public IP
        id: get-ip
        run: |
          EC2_IP=$(aws ec2 describe-instances \
            --instance-ids "$EC2_INSTANCE_ID" \
            --query 'Reservations[0].Instances[0].PublicIpAddress' \
            --output text)
          echo "ec2_ip=$EC2_IP" >> "$GITHUB_OUTPUT"
          echo "Resolved EC2 IP: $EC2_IP"

      - name: Deploy and restart Docker container on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.get-ip.outputs.ec2_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            if ! command -v docker >/dev/null 2>&1; then
              echo "Docker not found. Installing..."
              sudo apt-get update -y
              sudo apt-get install -y ca-certificates curl gnupg lsb-release
              sudo install -m 0755 -d /etc/apt/keyrings
              curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              sudo chmod a+r /etc/apt/keyrings/docker.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | sudo tee /etc/apt/sources.list.d/docker.list >/dev/null
              sudo apt-get update -y
              sudo apt-get install -y docker-ce docker-ce-cli containerd.io
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker ubuntu
            else
              echo "Docker already installed: $(docker --version)"
            fi

            echo "${{ secrets.DOCKER_PASSWORD }}" | sudo docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            sudo docker stop reddit-dashboard-api || true
            sudo docker rm reddit-dashboard-api || true
            sudo docker image prune -af
            sudo docker pull "${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

            cat > ~/.env << 'EOF'
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
            EOF

            sudo docker run -d \
              --name reddit-dashboard-api \
              --restart unless-stopped \
              -p 80:8000 \
              --env-file ~/.env \
              "${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

            sleep 10
            sudo docker logs --tail 50 reddit-dashboard-api

      - name: Verify health endpoint
        run: |
          EC2_IP=${{ steps.get-ip.outputs.ec2_ip }}
          echo "Target IP: $EC2_IP"
          echo "Waiting 60s for app startup..."
          sleep 60

          for i in {1..5}; do
            echo "--- Attempt $i/5 ---"
            HTTP_STATUS=$(curl -sv --connect-timeout 10 -o /tmp/health_response.txt \
              -w "%{http_code}" "http://${EC2_IP}/health" 2>/tmp/curl_verbose.txt || echo "000")
            echo "HTTP Status: $HTTP_STATUS"
            cat /tmp/health_response.txt 2>/dev/null || true

            if [ "$HTTP_STATUS" = "200" ]; then
              echo "Health check passed"
              exit 0
            fi

            echo "Health check not ready yet"
            cat /tmp/curl_verbose.txt 2>/dev/null || true

            if [ "$i" -lt 5 ]; then
              echo "Retrying in 20s..."
              sleep 20
            fi
          done

          echo "Health check failed after 5 attempts"
          echo "Resolved IP: $EC2_IP"
          exit 1
